apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: aquacharge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: aquacharge/analytics-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: aquacharge
spec:
  selector:
    app: analytics-service
  ports:
    - name: http
      port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: aquacharge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: aquacharge/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: DB_HOST
              value: user-db
            - name: DB_NAME
              value: userdb
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: aquacharge-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aquacharge-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aquacharge-secrets
                  key: POSTGRES_PASSWORD
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: aquacharge-config
                  key: CORS_ORIGIN
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aquacharge-secrets
                  key: JWT_SECRET
          livenessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 8
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: aquacharge
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 3002
      targetPort: 3002
---
